<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account - SafeHome+</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="login-container">

<div class="login-card">

<div class="logo">
🛡️
</div>

<h1>Create Account</h1>

<p>Create your SafeHome+ account</p>

<input
type="text"
id="fullname"
class="login-input"
placeholder="Full Name">

<input
type="email"
id="email"
class="login-input"
placeholder="Email Address">

<input
type="tel"
id="phone"
class="login-input"
placeholder="Phone Number">

<input
type="password"
id="regPassword"
class="login-input"
placeholder="Password">

<input
type="password"
id="confirmPassword"
class="login-input"
placeholder="Confirm Password">

<button
class="login-btn"
onclick="register()">

Create Account

</button>

<br><br>

<button
class="register-btn"
onclick="window.location.href='index.html'">

Back to Login

</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
