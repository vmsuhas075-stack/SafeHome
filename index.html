<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SOS Safety App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginCard" class="card">
    <h2>Login</h2>

    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">

    <button onclick="loginUser()">Login</button>

    <p>
        <span id="showSignup">Create Account</span> |
        <span id="showReset">Forgot Password</span>
    </p>
</div>

<!-- SIGNUP -->
<div id="signupCard" class="card" style="display:none;">
    <h2>Sign Up</h2>

    <input type="text" id="signupName" placeholder="Name">
    <input type="email" id="signupEmail" placeholder="Email">
    <input type="password" id="signupPassword" placeholder="Password">

    <button onclick="registerUser()">Create Account</button>

    <p><span id="showLogin">Back to Login</span></p>
</div>

<!-- RESET -->
<div id="resetCard" class="card" style="display:none;">
    <h2>Reset Password</h2>

    <input type="email" id="resetEmail" placeholder="Enter Email">

    <button onclick="resetPassword()">Send Reset</button>

    <p><span id="backToLogin">Back to Login</span></p>
</div>

<!-- SOS -->
<div class="sos-container">

    <button id="sosBtn" onclick="startSOS()">SOS</button>

    <div id="sosTimerContainer" style="display:none;">
        <div id="sosCircle">
            <span id="timerText">10</span>
        </div>
        <p>Emergency Active...</p>
    </div>

</div>

<!-- OPTIONAL DIARY -->
<div class="card">
    <h3>Incident Diary</h3>
    <textarea id="note" placeholder="Write incident..."></textarea>
    <button onclick="saveDiary()">Save</button>
</div>

<!-- LANGUAGE -->
<div class="card">
    <select id="language" onchange="changeLanguage()">
        <option value="en">English</option>
        <option value="hi">Hindi</option>
        <option value="kn">Kannada</option>
    </select>
</div>

<script src="script.js"></script>
</body>
</html>
