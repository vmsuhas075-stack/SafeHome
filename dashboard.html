<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeHome+</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="dashboard">

    <!-- Header -->
    <div class="header">
        <h1>🛡 SafeHome+</h1>
        <div class="status">🟢 SAFE</div>
    </div>

    <!-- Welcome Card -->
    <div class="welcome-card">
        <h2>Hello 👋</h2>
        <p>Your safety shield is active</p>
    </div>

    <!-- SOS Card -->
    <div class="sos-card" onclick="sendSOS()">
        <div>
            <h2>🚨 SOS EMERGENCY</h2>
            <p>Tap to alert emergency contacts</p>
        </div>

        <div class="arrow">
            ➜
        </div>
    </div>

    <!-- Status -->
    <div class="status-grid">

        <div class="mini-card">
            <i class="fa-solid fa-users"></i>
            <h3>Contacts</h3>
        </div>

        <div class="mini-card">
            <i class="fa-solid fa-shield-halved"></i>
            <h3>24/7</h3>
        </div>

        <div class="mini-card">
            <i class="fa-solid fa-location-dot"></i>
            <h3>GPS</h3>
        </div>

        <div class="mini-card">
            <i class="fa-solid fa-robot"></i>
            <h3>AI</h3>
        </div>

    </div>

    <h3 class="section-title">Safety Features</h3>

    <div class="feature-grid">

        <a href="contacts.html" class="feature-card">
            👥
            <span>Trusted Contacts</span>
        </a>

        <a href="diary.html" class="feature-card">
            📝
            <span>Incident Diary</span>
        </a>

        <a href="resources.html" class="feature-card">
            📞
            <span>Helplines</span>
        </a>

        <a href="#" class="feature-card">
            📍
            <span>Live Location</span>
        </a>

        <a href="#" class="feature-card">
            🎤
            <span>Voice Recorder</span>
        </a>

        <a href="#" class="feature-card">
            🗺
            <span>Safe Route</span>
        </a>

    </div>

    <button class="exit-btn" onclick="fakeExit()">
        ⚡ Quick Exit
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
